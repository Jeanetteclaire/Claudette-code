<svg width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Claudette launch chain</title>
  <desc>Vertical chain showing how Claudette gets started. launchctl loads at login, runs start_claudette.sh, which runs server.py with Python, which listens on port 5001. Each layer adds something to the environment of the layer below it.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .t { font-family: -apple-system, system-ui, sans-serif; font-size: 14px; fill: #2C2C2A; }
      .ts { font-family: -apple-system, system-ui, sans-serif; font-size: 12px; fill: #5F5E5A; }
      .th { font-family: -apple-system, system-ui, sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
      .arr { fill: none; stroke: #5F5E5A; stroke-width: 1; }
      .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple text { fill: #3C3489; }
      .c-pink rect { fill: #FBEAF0; stroke: #D4537E; }
      .c-pink text { fill: #72243E; }
      .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
      .c-gray text { fill: #2C2C2A; }
    </style>
  </defs>

  <text class="th" x="40" y="40">Launch chain — what actually starts her</text>
  <text class="ts" x="40" y="58">Each layer inherits and modifies the one above. Read top to bottom.</text>

  <g class="c-gray">
    <rect x="220" y="80" width="240" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="102" text-anchor="middle" dominant-baseline="central">macOS login (Aqua session)</text>
    <text class="ts" x="340" y="120" text-anchor="middle" dominant-baseline="central">Triggers everything below</text>
  </g>

  <text class="ts" x="478" y="112">User session created;</text>
  <text class="ts" x="478" y="128">no terminal yet</text>

  <line x1="340" y1="136" x2="340" y2="160" class="arr" marker-end="url(#arrow)"/>

  <g class="c-purple">
    <rect x="220" y="160" width="240" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="182" text-anchor="middle" dominant-baseline="central">launchctl</text>
    <text class="ts" x="340" y="200" text-anchor="middle" dominant-baseline="central">com.claudette.server</text>
  </g>

  <text class="ts" x="478" y="184">Sets stdin to /dev/null,</text>
  <text class="ts" x="478" y="200">env from plist, no TTY</text>

  <line x1="340" y1="216" x2="340" y2="240" class="arr" marker-end="url(#arrow)"/>

  <g class="c-purple">
    <rect x="220" y="240" width="240" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="262" text-anchor="middle" dominant-baseline="central">start_claudette.sh</text>
    <text class="ts" x="340" y="280" text-anchor="middle" dominant-baseline="central">Shell wrapper script</text>
  </g>

  <text class="ts" x="478" y="264">Sets working dir,</text>
  <text class="ts" x="478" y="280">PYTHONUNBUFFERED=1</text>

  <line x1="340" y1="296" x2="340" y2="320" class="arr" marker-end="url(#arrow)"/>

  <g class="c-purple">
    <rect x="220" y="320" width="240" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="342" text-anchor="middle" dominant-baseline="central">python3 server.py</text>
    <text class="ts" x="340" y="360" text-anchor="middle" dominant-baseline="central">Flask app initialises</text>
  </g>

  <text class="ts" x="478" y="344">Loads .env, starts</text>
  <text class="ts" x="478" y="360">background threads</text>

  <line x1="340" y1="376" x2="340" y2="400" class="arr" marker-end="url(#arrow)"/>

  <g class="c-pink">
    <rect x="220" y="400" width="240" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="422" text-anchor="middle" dominant-baseline="central">Listening on port 5001</text>
    <text class="ts" x="340" y="440" text-anchor="middle" dominant-baseline="central">Ready for browser requests</text>
  </g>

  <text class="ts" x="40" y="476">memory_writer.py is also spawned by server.py later, on demand, when a session ends — outside this chain.</text>
</svg>

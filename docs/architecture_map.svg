<svg width="100%" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Claudette architecture map</title>
  <desc>High-level component diagram. Browser connects to server.py which contains three inner regions: Session, Library, and Voice and Eye. server.py spawns memory_writer.py at session end. server.py connects to Claude API, GitHub for memory and library, Fish Audio, and local disk. memory_writer.py also connects to Claude API and GitHub.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .t { font-family: -apple-system, system-ui, sans-serif; font-size: 14px; fill: #2C2C2A; }
      .ts { font-family: -apple-system, system-ui, sans-serif; font-size: 12px; fill: #5F5E5A; }
      .th { font-family: -apple-system, system-ui, sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
      .arr { fill: none; stroke: #5F5E5A; stroke-width: 1; }
      .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple text { fill: #3C3489; }
      .c-pink rect { fill: #FBEAF0; stroke: #D4537E; }
      .c-pink text { fill: #72243E; }
      .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
      .c-teal text { fill: #085041; }
      .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
      .c-gray text { fill: #2C2C2A; }
    </style>
  </defs>

  <g class="c-gray">
    <rect x="380" y="30" width="140" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="450" y="52" text-anchor="middle" dominant-baseline="central">Browser</text>
  </g>

  <line x1="450" y1="74" x2="450" y2="100" class="arr" marker-end="url(#arrow)"/>

  <g class="c-purple">
    <rect x="240" y="100" width="380" height="140" rx="14" stroke-width="0.5"/>
    <text class="th" x="430" y="125" text-anchor="middle" dominant-baseline="central">server.py</text>
    <text class="ts" x="430" y="143" text-anchor="middle" dominant-baseline="central">Flask, port 5001</text>
  </g>

  <g class="c-pink">
    <rect x="256" y="160" width="105" height="70" rx="8" stroke-width="0.5"/>
    <text class="th" x="308.5" y="188" text-anchor="middle" dominant-baseline="central">Session</text>
    <text class="ts" x="308.5" y="208" text-anchor="middle" dominant-baseline="central">Conversation</text>
  </g>

  <g class="c-pink">
    <rect x="377" y="160" width="105" height="70" rx="8" stroke-width="0.5"/>
    <text class="th" x="429.5" y="188" text-anchor="middle" dominant-baseline="central">Library</text>
    <text class="ts" x="429.5" y="208" text-anchor="middle" dominant-baseline="central">45 min loop</text>
  </g>

  <g class="c-pink">
    <rect x="498" y="160" width="105" height="70" rx="8" stroke-width="0.5"/>
    <text class="th" x="550.5" y="188" text-anchor="middle" dominant-baseline="central">Voice &amp; Eye</text>
    <text class="ts" x="550.5" y="208" text-anchor="middle" dominant-baseline="central">Speech, vision</text>
  </g>

  <g class="c-purple">
    <rect x="40" y="100" width="170" height="140" rx="14" stroke-dasharray="5 4" stroke-width="1"/>
    <text class="th" x="125" y="135" text-anchor="middle" dominant-baseline="central">memory_writer.py</text>
    <text class="ts" x="125" y="158" text-anchor="middle" dominant-baseline="central">Spawned at /end</text>
    <text class="ts" x="125" y="180" text-anchor="middle" dominant-baseline="central">Subprocess</text>
  </g>

  <line x1="240" y1="170" x2="210" y2="170" stroke="#534AB7" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>
  <text class="ts" x="225" y="162" text-anchor="middle">spawn</text>

  <g class="c-teal">
    <rect x="40" y="280" width="140" height="60" rx="8" stroke-width="0.5"/>
    <text class="th" x="110" y="304" text-anchor="middle" dominant-baseline="central">Claude API</text>
    <text class="ts" x="110" y="322" text-anchor="middle" dominant-baseline="central">External</text>
  </g>

  <g class="c-teal">
    <rect x="200" y="280" width="160" height="60" rx="8" stroke-width="0.5"/>
    <text class="th" x="280" y="304" text-anchor="middle" dominant-baseline="central">GitHub</text>
    <text class="ts" x="280" y="322" text-anchor="middle" dominant-baseline="central">Memory + library</text>
  </g>

  <g class="c-teal">
    <rect x="380" y="280" width="130" height="60" rx="8" stroke-width="0.5"/>
    <text class="th" x="445" y="304" text-anchor="middle" dominant-baseline="central">Fish Audio</text>
    <text class="ts" x="445" y="322" text-anchor="middle" dominant-baseline="central">Voice</text>
  </g>

  <g class="c-gray">
    <rect x="530" y="280" width="110" height="60" rx="8" stroke-width="0.5"/>
    <text class="th" x="585" y="304" text-anchor="middle" dominant-baseline="central">Disk</text>
    <text class="ts" x="585" y="322" text-anchor="middle" dominant-baseline="central">Transcripts</text>
  </g>

  <line x1="110" y1="240" x2="110" y2="280" class="arr" marker-end="url(#arrow)"/>
  <line x1="155" y1="240" x2="240" y2="280" class="arr" marker-end="url(#arrow)"/>
  <line x1="320" y1="240" x2="320" y2="280" class="arr" marker-end="url(#arrow)"/>
  <line x1="445" y1="240" x2="445" y2="280" class="arr" marker-end="url(#arrow)"/>
  <line x1="585" y1="240" x2="585" y2="280" class="arr" marker-end="url(#arrow)"/>
</svg>

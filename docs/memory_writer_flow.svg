<svg width="100%" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Memory writer flow</title>
  <desc>Top-to-bottom flowchart of memory_writer.py. Six stages: spawned by server.py, connect to GitHub, test API key, read current memory, call Claude API streaming, write updated files. Each stage can fail; failure branches lead to exit on the right.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .t { font-family: -apple-system, system-ui, sans-serif; font-size: 14px; fill: #2C2C2A; }
      .ts { font-family: -apple-system, system-ui, sans-serif; font-size: 12px; fill: #5F5E5A; }
      .th { font-family: -apple-system, system-ui, sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
      .arr { fill: none; stroke: #5F5E5A; stroke-width: 1; }
      .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple text { fill: #3C3489; }
      .c-pink rect { fill: #FBEAF0; stroke: #D4537E; }
      .c-pink text { fill: #72243E; }
      .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
      .c-gray text { fill: #2C2C2A; }
    </style>
  </defs>

  <text class="th" x="40" y="40">Happy path (left)</text>
  <text class="ts" x="40" y="58">Failure exits (right)</text>

  <g class="c-pink">
    <rect x="180" y="80" width="240" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="300" y="102" text-anchor="middle" dominant-baseline="central">Spawned by server.py</text>
  </g>

  <line x1="300" y1="124" x2="300" y2="148" class="arr" marker-end="url(#arrow)"/>

  <g class="c-purple">
    <rect x="180" y="148" width="240" height="60" rx="8" stroke-width="0.5"/>
    <text class="th" x="300" y="170" text-anchor="middle" dominant-baseline="central">Connect to GitHub</text>
    <text class="ts" x="300" y="190" text-anchor="middle" dominant-baseline="central">Authenticate via token</text>
  </g>

  <line x1="420" y1="178" x2="488" y2="178" class="arr" marker-end="url(#arrow)"/>
  <g class="c-gray">
    <rect x="488" y="156" width="152" height="44" rx="8" stroke-width="0.5"/>
    <text class="ts" x="564" y="178" text-anchor="middle" dominant-baseline="central">Auth fail → exit</text>
  </g>

  <line x1="300" y1="208" x2="300" y2="232" class="arr" marker-end="url(#arrow)"/>

  <g class="c-purple">
    <rect x="180" y="232" width="240" height="60" rx="8" stroke-width="0.5"/>
    <text class="th" x="300" y="254" text-anchor="middle" dominant-baseline="central">Test API key</text>
    <text class="ts" x="300" y="274" text-anchor="middle" dominant-baseline="central">Tiny call to verify</text>
  </g>

  <line x1="420" y1="262" x2="488" y2="262" class="arr" marker-end="url(#arrow)"/>
  <g class="c-gray">
    <rect x="488" y="240" width="152" height="44" rx="8" stroke-width="0.5"/>
    <text class="ts" x="564" y="262" text-anchor="middle" dominant-baseline="central">Bad key → exit</text>
  </g>

  <line x1="300" y1="292" x2="300" y2="316" class="arr" marker-end="url(#arrow)"/>

  <g class="c-purple">
    <rect x="180" y="316" width="240" height="60" rx="8" stroke-width="0.5"/>
    <text class="th" x="300" y="338" text-anchor="middle" dominant-baseline="central">Read current memory</text>
    <text class="ts" x="300" y="358" text-anchor="middle" dominant-baseline="central">Fetch all files from GitHub</text>
  </g>

  <line x1="300" y1="376" x2="300" y2="400" class="arr" marker-end="url(#arrow)"/>

  <g class="c-purple">
    <rect x="160" y="400" width="280" height="80" rx="8" stroke-width="1.5"/>
    <text class="th" x="300" y="422" text-anchor="middle" dominant-baseline="central">Call Claude API (streaming)</text>
    <text class="ts" x="300" y="442" text-anchor="middle" dominant-baseline="central">Sends transcript + current memory.</text>
    <text class="ts" x="300" y="460" text-anchor="middle" dominant-baseline="central">Slowest stage; usually 7–12 minutes</text>
  </g>

  <line x1="440" y1="440" x2="488" y2="440" class="arr" marker-end="url(#arrow)"/>
  <g class="c-gray">
    <rect x="488" y="418" width="152" height="44" rx="8" stroke-width="0.5"/>
    <text class="ts" x="564" y="440" text-anchor="middle" dominant-baseline="central">Timeout → exit</text>
  </g>

  <line x1="300" y1="480" x2="300" y2="504" class="arr" marker-end="url(#arrow)"/>

  <g class="c-purple">
    <rect x="180" y="504" width="240" height="60" rx="8" stroke-width="0.5"/>
    <text class="th" x="300" y="526" text-anchor="middle" dominant-baseline="central">Parse JSON response</text>
    <text class="ts" x="300" y="546" text-anchor="middle" dominant-baseline="central">Extract the file updates</text>
  </g>

  <line x1="420" y1="534" x2="488" y2="534" class="arr" marker-end="url(#arrow)"/>
  <g class="c-gray">
    <rect x="488" y="512" width="152" height="44" rx="8" stroke-width="0.5"/>
    <text class="ts" x="564" y="534" text-anchor="middle" dominant-baseline="central">Bad JSON → exit</text>
  </g>

  <line x1="300" y1="564" x2="300" y2="588" class="arr" marker-end="url(#arrow)"/>

  <g class="c-purple">
    <rect x="180" y="588" width="240" height="60" rx="8" stroke-width="0.5"/>
    <text class="th" x="300" y="610" text-anchor="middle" dominant-baseline="central">Write updated files</text>
    <text class="ts" x="300" y="630" text-anchor="middle" dominant-baseline="central">One commit per file to GitHub</text>
  </g>

  <line x1="300" y1="648" x2="300" y2="672" class="arr" marker-end="url(#arrow)"/>

  <g class="c-pink">
    <rect x="220" y="672" width="160" height="40" rx="8" stroke-width="0.5"/>
    <text class="th" x="300" y="692" text-anchor="middle" dominant-baseline="central">Exit cleanly</text>
  </g>
</svg>
